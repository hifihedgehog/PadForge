name: Feature Request
description: Suggest a new feature or improvement for PadForge
title: "[Feature Request] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see? What problem does it solve?
      placeholder: "Describe the feature..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this feature? What's your workflow?
      placeholder: "I would use this to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
      placeholder: "I currently work around this by..."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to related tools, or anything else
