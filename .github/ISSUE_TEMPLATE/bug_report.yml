name: Bug Report
description: Report a bug or unexpected behavior in PadForge
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open PadForge
        2. Go to...
        3. Click on...
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PadForge Version
      description: Found in Settings or the title bar
      placeholder: "e.g., v2.0.0-beta6"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: "Run `winver` to check"
      placeholder: "e.g., Windows 11 24H2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Controller/Device
      description: Which device(s) were you using when the bug occurred?
      placeholder: "e.g., Xbox Wireless Controller, DualSense"

  - type: dropdown
    id: output_type
    attributes:
      label: Virtual Controller Type
      description: Which output type were you using?
      options:
        - Xbox 360
        - DualShock 4
        - vJoy
        - MIDI
        - N/A
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, logs, or anything else that might help
