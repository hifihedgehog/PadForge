name: "Game Config Submission"
description: "Submit a recommended controller configuration for a specific game"
title: "[Game Config] "
labels: ["game-config"]
body:
  - type: input
    id: game_name
    attributes:
      label: Game Name
      description: "Full name of the game or emulator"
      placeholder: "e.g. Cemu (Wii U Emulator)"
    validations:
      required: true

  - type: input
    id: exe_names
    attributes:
      label: Executable Name(s)
      description: "Comma-separated executable filenames (just the filename, not the full path)"
      placeholder: "e.g. cemu.exe, game.exe"
    validations:
      required: true

  - type: input
    id: config_label
    attributes:
      label: Config Label
      description: "Short label to distinguish this config from others for the same game"
      placeholder: "e.g. DS4 with gyro, Xbox basic, vJoy DirectInput"
    validations:
      required: true

  - type: dropdown
    id: output_type
    attributes:
      label: Recommended Output Type
      description: "Which virtual controller type works best?"
      options:
        - Xbox 360
        - DualShock 4
        - vJoy
        - No preference
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Exported Settings
      description: "Use the 'Submit Game Config' button in PadForge to auto-fill this field with your profile's controller settings (button mappings, dead zones, force feedback, vJoy mappings, etc.). If submitting manually, paste the PadSetting JSON block here."
      render: json
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: "Any extra tips, quirks, or game-specific instructions not captured in the settings export."
      placeholder: "e.g. Requires specific axis inversion for camera controls, game has its own dead zone so set PadForge dead zone to 0"

  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: I tested these settings with PadForge
          required: true
        - label: The game works correctly with these settings
          required: true
